version: "3"

vars:
  SOPS_FILE: .env.encrypted
  ENV_FILE: .env
  PYTHON: uv run
  IMAGE_NAME: github-tamagotchi
  GH_REPO: wiebe-xyz/github-tamagotchi

tasks:
  # --- Secrets management ---

  secrets:decrypt:
    desc: Decrypt .env.encrypted to .env
    cmds:
      - sops decrypt --input-type dotenv --output-type dotenv --output {{.ENV_FILE}} {{.SOPS_FILE}}
    generates:
      - "{{.ENV_FILE}}"
    sources:
      - "{{.SOPS_FILE}}"

  secrets:encrypt:
    desc: Encrypt .env to .env.encrypted
    cmds:
      - sops encrypt --input-type dotenv --output-type dotenv --output {{.SOPS_FILE}} {{.ENV_FILE}}
    sources:
      - "{{.ENV_FILE}}"
    generates:
      - "{{.SOPS_FILE}}"

  secrets:edit:
    desc: Open .env.encrypted in $EDITOR for inline editing
    cmds:
      - EDITOR={{.EDITOR | default "vim"}} sops edit --input-type dotenv --output-type dotenv {{.SOPS_FILE}}

  secrets:edit:production:
    desc: Edit production secrets in $EDITOR
    cmds:
      - EDITOR={{.EDITOR | default "vim"}} sops edit --input-type dotenv --output-type dotenv .env.production.encrypted

  secrets:edit:staging:
    desc: Edit staging secrets in $EDITOR
    cmds:
      - EDITOR={{.EDITOR | default "vim"}} sops edit --input-type dotenv --output-type dotenv .env.staging.encrypted

  secrets:decrypt:production:
    desc: Decrypt .env.production.encrypted
    cmds:
      - sops decrypt --input-type dotenv --output-type dotenv --output .env.production .env.production.encrypted

  secrets:decrypt:staging:
    desc: Decrypt .env.staging.encrypted
    cmds:
      - sops decrypt --input-type dotenv --output-type dotenv --output .env.staging .env.staging.encrypted

  secrets:encrypt:production:
    desc: Encrypt .env.production
    cmds:
      - sops encrypt --input-type dotenv --output-type dotenv --output .env.production.encrypted .env.production

  secrets:encrypt:staging:
    desc: Encrypt .env.staging
    cmds:
      - sops encrypt --input-type dotenv --output-type dotenv --output .env.staging.encrypted .env.staging

  secrets:push:
    desc: Push all environment secrets to GitHub Actions
    cmds:
      - task: secrets:push:shared
      - task: secrets:push:staging
      - task: secrets:push:production

  secrets:push:shared:
    desc: Push shared secrets (KUBECONFIG, KUBECONFIG_PROD) to GitHub
    cmds:
      - |
        echo "Pushing shared secrets to GitHub..."
        gh secret set KUBECONFIG_PROD --repo {{.GH_REPO}} < <(sops decrypt --input-type dotenv --output-type dotenv .env.production.encrypted 2>/dev/null | grep -q . && echo "skipped" || true)
        echo "Done. Set KUBECONFIG and KUBECONFIG_PROD manually if not already configured."

  secrets:push:staging:
    desc: Push staging secrets from .env.staging.encrypted to GitHub
    cmds:
      - |
        sops decrypt --input-type dotenv --output-type dotenv .env.staging.encrypted | while IFS='=' read -r key value; do
          [ -z "$key" ] && continue
          [[ "$key" =~ ^# ]] && continue
          GH_KEY="STAGING_$(echo "$key" | tr '[:lower:]' '[:upper:]')"
          echo "  Setting $GH_KEY"
          echo -n "$value" | gh secret set "$GH_KEY" --repo {{.GH_REPO}}
        done
        echo "Staging secrets pushed."

  secrets:push:production:
    desc: Push production secrets from .env.production.encrypted to GitHub
    cmds:
      - |
        sops decrypt --input-type dotenv --output-type dotenv .env.production.encrypted | while IFS='=' read -r key value; do
          [ -z "$key" ] && continue
          [[ "$key" =~ ^# ]] && continue
          GH_KEY="PROD_$(echo "$key" | tr '[:lower:]' '[:upper:]')"
          echo "  Setting $GH_KEY"
          echo -n "$value" | gh secret set "$GH_KEY" --repo {{.GH_REPO}}
        done
        echo "Production secrets pushed."

  # --- Development ---

  setup:
    desc: Set up development environment
    cmds:
      - uv sync --extra dev
      - task: secrets:decrypt
      - echo "Ready. Run 'task dev' to start the server."

  dev:
    desc: Run development server with auto-reload
    deps: [secrets:decrypt]
    cmds:
      - "{{.PYTHON}} uvicorn github_tamagotchi.main:app --reload --host 0.0.0.0 --port 8000"

  # --- Quality ---

  lint:
    desc: Run ruff linter
    cmds:
      - "{{.PYTHON}} ruff check ."

  fmt:
    desc: Format code with ruff
    cmds:
      - "{{.PYTHON}} ruff format ."
      - "{{.PYTHON}} ruff check --fix ."

  typecheck:
    desc: Run mypy type checker
    cmds:
      - "{{.PYTHON}} mypy src/"

  check:
    desc: Run all quality checks (lint + typecheck)
    cmds:
      - task: lint
      - task: typecheck

  # --- Testing ---

  test:
    desc: Run test suite with coverage (excludes e2e)
    cmds:
      - "{{.PYTHON}} pytest tests/ --ignore=tests/e2e --cov=src --cov-report=term-missing --cov-fail-under=70 --timeout=60"

  test:unit:
    desc: Run unit tests only
    cmds:
      - "{{.PYTHON}} pytest tests/unit -v"

  test:services:
    desc: Run service integration tests
    cmds:
      - "{{.PYTHON}} pytest tests/services -v"

  test:api:
    desc: Run API tests
    cmds:
      - "{{.PYTHON}} pytest tests/api -v"

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - "{{.PYTHON}} pytest tests/e2e -v"

  test:fast:
    desc: Run tests without coverage (faster, excludes e2e)
    cmds:
      - "{{.PYTHON}} pytest tests/ --ignore=tests/e2e -q"

  # --- Build & Deploy ---

  build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.IMAGE_NAME}} .

  build:push:
    desc: Build and push to GHCR
    cmds:
      - docker build -t ghcr.io/wiebe-xyz/{{.IMAGE_NAME}}:latest .
      - docker push ghcr.io/wiebe-xyz/{{.IMAGE_NAME}}:latest

  # --- Database ---

  db:migrate:
    desc: Run database migrations
    cmds:
      - "{{.PYTHON}} alembic upgrade head"

  db:rollback:
    desc: Rollback last database migration
    cmds:
      - "{{.PYTHON}} alembic downgrade -1"

  db:revision:
    desc: Create a new migration revision
    cmds:
      - '{{.PYTHON}} alembic revision --autogenerate -m "{{.CLI_ARGS}}"'

  db:history:
    desc: Show migration history
    cmds:
      - "{{.PYTHON}} alembic history --verbose"

  # --- Kubernetes (testing — Nijmegen cluster) ---

  k8s:secrets:
    desc: Decrypt and apply k8s secrets to testing
    cmds:
      - sops decrypt k8s/secrets.yaml | ssh deployer@k3s1 "kubectl apply -f -"

  k8s:init:
    desc: Run init jobs for testing (database + MinIO)
    cmds:
      - ssh deployer@k3s1 "kubectl delete job github-tamagotchi-init-db github-tamagotchi-init-minio -n nijmegen-testing --ignore-not-found"
      - cat k8s/init-db.yaml | ssh deployer@k3s1 "kubectl apply -f -"
      - ssh deployer@k3s1 "kubectl wait --for=condition=complete job/github-tamagotchi-init-db -n nijmegen-testing --timeout=60s"
      - ssh deployer@k3s1 "kubectl wait --for=condition=complete job/github-tamagotchi-init-minio -n nijmegen-testing --timeout=60s"

  k8s:deploy:
    desc: Apply all k8s manifests and scale up blue (testing, initial setup)
    cmds:
      - task: k8s:secrets
      - task: k8s:init
      - cat k8s/deployment.yaml | ssh deployer@k3s1 "kubectl apply -f -"
      - ssh deployer@k3s1 "kubectl scale deployment/github-tamagotchi-blue --replicas=1 -n nijmegen-testing"
      - ssh deployer@k3s1 "kubectl rollout status deployment/github-tamagotchi-blue -n nijmegen-testing --timeout=120s"

  k8s:status:
    desc: Show pod status for github-tamagotchi (testing)
    cmds:
      - ssh deployer@k3s1 "kubectl get pods -n nijmegen-testing -l app=github-tamagotchi -o wide"

  k8s:logs:
    desc: Tail logs from the active testing pod
    cmds:
      - ssh deployer@k3s1 "ACTIVE=\$(kubectl get service github-tamagotchi -n nijmegen-testing -o jsonpath='{.spec.selector.version}'); kubectl logs -n nijmegen-testing -l app=github-tamagotchi,version=\$ACTIVE --tail=50 -f"

  # --- Kubernetes (production — layer7) ---

  k8s:prod:init:
    desc: Run init jobs for production on layer7
    cmds:
      - ssh deployer@layer7.wiebe.xyz "kubectl delete job github-tamagotchi-init-db github-tamagotchi-init-minio -n tamagotchi-production --ignore-not-found"
      - cat k8s/production/init-db.yaml | ssh deployer@layer7.wiebe.xyz "kubectl apply -f -"
      - ssh deployer@layer7.wiebe.xyz "kubectl wait --for=condition=complete job/github-tamagotchi-init-db -n tamagotchi-production --timeout=60s"
      - ssh deployer@layer7.wiebe.xyz "kubectl wait --for=condition=complete job/github-tamagotchi-init-minio -n tamagotchi-production --timeout=60s"

  k8s:prod:deploy:
    desc: Apply production manifests to layer7 (initial setup)
    cmds:
      - cat k8s/production/namespace.yaml | ssh deployer@layer7.wiebe.xyz "kubectl apply -f -"
      - cat k8s/production/middleware.yaml | ssh deployer@layer7.wiebe.xyz "kubectl apply -f -"
      - cat k8s/production/deployment.yaml | ssh deployer@layer7.wiebe.xyz "kubectl apply -f -"
      - cat k8s/production/ingress.yaml | ssh deployer@layer7.wiebe.xyz "kubectl apply -f -"

  k8s:prod:status:
    desc: Show pod status for production on layer7
    cmds:
      - ssh deployer@layer7.wiebe.xyz "kubectl get pods -n tamagotchi-production -l app=github-tamagotchi -o wide"

  k8s:prod:logs:
    desc: Tail logs from the active production pod on layer7
    cmds:
      - ssh deployer@layer7.wiebe.xyz "ACTIVE=\$(kubectl get service github-tamagotchi -n tamagotchi-production -o jsonpath='{.spec.selector.version}'); kubectl logs -n tamagotchi-production -l app=github-tamagotchi,version=\$ACTIVE --tail=50 -f"

  k8s:prod:secrets:
    desc: Push production secrets from SOPS to k8s on layer7
    cmds:
      - |
        PATCH=$(sops decrypt --input-type dotenv --output-type dotenv .env.production.encrypted | python3 -c "
        import sys, json
        KEY_MAP = {
            'DATABASE_URL': 'database-url', 'GITHUB_TOKEN': 'github-token',
            'OPENROUTER_API_KEY': 'openrouter-api-key',
            'MINIO_ACCESS_KEY': 'minio-access-key', 'MINIO_SECRET_KEY': 'minio-secret-key',
            'GITHUB_OAUTH_CLIENT_ID': 'github-oauth-client-id',
            'GITHUB_OAUTH_CLIENT_SECRET': 'github-oauth-client-secret',
            'JWT_SECRET_KEY': 'jwt-secret-key', 'TOKEN_ENCRYPTION_KEY': 'token-encryption-key',
            'SENTRY_DSN': 'sentry-dsn', 'BUGBARN_API_KEY': 'bugbarn-api-key',
            'VAPID_PRIVATE_KEY': 'vapid-private-key', 'VAPID_PUBLIC_KEY': 'vapid-public-key',
        }
        data = {}
        for line in sys.stdin:
            line = line.strip()
            if '=' in line:
                k, v = line.split('=', 1)
                if k in KEY_MAP and v and v != 'placeholder':
                    data[KEY_MAP[k]] = v
        print(json.dumps({'stringData': data}))
        ")
        echo "$PATCH" | ssh deployer@layer7.wiebe.xyz \
          "kubectl patch secret github-tamagotchi-secrets -n tamagotchi-production --type=merge -p=\"\$(cat)\""

  # --- Cleanup ---

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name .pytest_cache -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name .mypy_cache -exec rm -rf {} + 2>/dev/null || true
      - find . -name "*.pyc" -delete 2>/dev/null || true
      - rm -rf .coverage htmlcov coverage.xml .ruff_cache

  clean:all:
    desc: Full clean including venv
    deps: [clean]
    cmds:
      - rm -rf .venv

  # --- CI simulation ---

  ci:
    desc: Run the full CI pipeline locally (mirrors GitHub Actions)
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: test:e2e
      - task: build
