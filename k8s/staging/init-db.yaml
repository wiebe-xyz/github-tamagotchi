apiVersion: batch/v1
kind: Job
metadata:
  name: github-tamagotchi-init-db
  namespace: tama-staging
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgresql.tama-staging.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: github-tamagotchi-secrets
                  key: database-url
          command:
            - sh
            - -c
            - |
              set -e
              TARGET_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')
              TARGET_PASS=$(echo "$DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')
              TARGET_DB=$(echo "$DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

              echo "Target: user=$TARGET_USER db=$TARGET_DB host=$PGHOST"

              echo "Waiting for PostgreSQL to accept connections..."
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER >/dev/null 2>&1; do
                sleep 2
              done

              echo "Ensuring role '$TARGET_USER' exists..."
              psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -v ON_ERROR_STOP=1 -c \
                "DO \$\$ BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$TARGET_USER') THEN
                    CREATE ROLE $TARGET_USER WITH LOGIN PASSWORD '$TARGET_PASS';
                  ELSE
                    ALTER ROLE $TARGET_USER WITH PASSWORD '$TARGET_PASS';
                  END IF;
                END \$\$;"

              echo "Ensuring database '$TARGET_DB' exists..."
              if psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$TARGET_DB'" | grep -q 1; then
                echo "Database '$TARGET_DB' already exists."
              else
                psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE $TARGET_DB OWNER $TARGET_USER;"
                echo "Database '$TARGET_DB' created."
              fi

              echo "Database provisioning complete."
