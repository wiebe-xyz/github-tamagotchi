apiVersion: batch/v1
kind: Job
metadata:
  name: github-tamagotchi-init-db
  namespace: nijmegen-testing
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              value: tamagotchi
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: github-tamagotchi-secrets
                  key: database-user
                  optional: true
          command:
            - sh
            - -c
            - |
              set -e
              PGHOST=postgresql
              PGPORT=5432
              PGUSER=rapidroot
              TARGET_DB="${DB_NAME}"
              TARGET_USER="${DB_USER:-tamagotchi}"

              echo "Checking if database '$TARGET_DB' exists..."
              if psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$TARGET_DB'" | grep -q 1; then
                echo "Database '$TARGET_DB' already exists."
              else
                echo "Creating user '$TARGET_USER' if not exists..."
                psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$TARGET_USER') THEN CREATE ROLE $TARGET_USER WITH LOGIN PASSWORD '$TARGET_USER'; END IF; END \$\$;"
                echo "Creating database '$TARGET_DB'..."
                psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE $TARGET_DB OWNER $TARGET_USER;"
                echo "Done."
              fi
