apiVersion: batch/v1
kind: Job
metadata:
  name: github-tamagotchi-init-db
  namespace: tama-test
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: github-tamagotchi-secrets
                  key: database-url
          command:
            - sh
            - -c
            - |
              set -e
              PGHOST=postgresql
              PGPORT=5432
              PGUSER=rapidroot

              # Parse target DB name, user, and password from DATABASE_URL
              TARGET_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')
              TARGET_PASS=$(echo "$DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')
              TARGET_DB=$(echo "$DATABASE_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

              echo "Target: user=$TARGET_USER db=$TARGET_DB"

              echo "Ensuring user '$TARGET_USER' exists..."
              psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c \
                "DO \$\$ BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$TARGET_USER') THEN
                    CREATE ROLE $TARGET_USER WITH LOGIN PASSWORD '$TARGET_PASS';
                  ELSE
                    ALTER ROLE $TARGET_USER WITH PASSWORD '$TARGET_PASS';
                  END IF;
                END \$\$;"

              echo "Ensuring database '$TARGET_DB' exists..."
              if psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$TARGET_DB'" | grep -q 1; then
                echo "Database '$TARGET_DB' already exists."
              else
                psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE $TARGET_DB OWNER $TARGET_USER;"
                echo "Database '$TARGET_DB' created."
              fi

              echo "Database provisioning complete."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: github-tamagotchi-init-minio
  namespace: tama-test
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-minio
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: github-tamagotchi-secrets
                  key: minio-access-key
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mc alias set minio http://minio:9000 admin "$MINIO_ROOT_PASSWORD"

              echo "Creating bucket 'tamagotchi' if not exists..."
              mc mb --ignore-existing minio/tamagotchi

              echo "Ensuring access policy for service account..."
              cat > /tmp/policy.json <<'POLICY'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:*"],
                    "Resource": ["arn:aws:s3:::tamagotchi", "arn:aws:s3:::tamagotchi/*"]
                  }
                ]
              }
              POLICY
              mc admin policy create minio tamagotchi-readwrite /tmp/policy.json 2>/dev/null || true
              mc admin policy attach minio tamagotchi-readwrite --user "$MINIO_ACCESS_KEY" 2>/dev/null || true

              echo "MinIO setup complete."
