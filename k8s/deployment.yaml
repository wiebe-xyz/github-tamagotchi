apiVersion: v1
kind: Service
metadata:
  name: github-tamagotchi
  namespace: nijmegen-testing
spec:
  selector:
    app: github-tamagotchi
    version: blue
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-tamagotchi
  namespace: nijmegen-testing
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: tamagotchi.nijmegen.wiebe.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-tamagotchi
                port:
                  number: 8000
  tls:
    - hosts:
        - tamagotchi.nijmegen.wiebe.xyz
