name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/e2e --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=75 --timeout=60
        timeout-minutes: 5

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short --timeout=60
        timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to k3s
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

          # Pin both container and initContainer images to this exact build
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          sed -i "s|ghcr.io/${{ github.repository }}:latest|${IMAGE}|g" k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml
          if ! kubectl rollout status deployment/github-tamagotchi-blue -n nijmegen-testing --timeout=900s; then
            echo "=== POD DESCRIBE ===" && kubectl describe pods -n nijmegen-testing -l app=github-tamagotchi,version=blue
            echo "=== INIT CONTAINER LOGS ===" && kubectl logs -n nijmegen-testing -l app=github-tamagotchi,version=blue -c migrate --tail=50 2>/dev/null || true
            echo "=== APP CONTAINER LOGS ===" && kubectl logs -n nijmegen-testing -l app=github-tamagotchi,version=blue -c github-tamagotchi --tail=50 2>/dev/null || true
            exit 1
          fi
