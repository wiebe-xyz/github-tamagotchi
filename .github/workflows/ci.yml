name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/e2e --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=75 --timeout=60
        timeout-minutes: 5

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short --timeout=60
        timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to k3s
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          BUGBARN_API_KEY: ${{ secrets.BUGBARN_API_KEY_PROD }}
          BUGBARN_CI_KEY: ${{ secrets.BUGBARN_CI_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          NS="nijmegen-testing"

          # Inject secrets into k8s secret
          kubectl patch secret github-tamagotchi-secrets -n $NS \
            --type='merge' \
            -p="{\"stringData\":{\"bugbarn-api-key\":\"$BUGBARN_API_KEY\",\"vapid-private-key\":\"$VAPID_PRIVATE_KEY\",\"vapid-public-key\":\"$VAPID_PUBLIC_KEY\"}}"

          # Determine which color is live
          ACTIVE=$(kubectl get service github-tamagotchi -n $NS \
            -o jsonpath='{.spec.selector.version}')
          if [ "$ACTIVE" = "blue" ]; then INACTIVE="green"; else INACTIVE="blue"; fi
          echo "Active: $ACTIVE | Deploying to: $INACTIVE"

          # Update the idle deployment's image (container + initContainer)
          kubectl set image deployment/github-tamagotchi-$INACTIVE \
            github-tamagotchi=$IMAGE migrate=$IMAGE -n $NS

          # Scale idle deployment up
          kubectl scale deployment/github-tamagotchi-$INACTIVE --replicas=1 -n $NS

          # Wait for the new deployment to be fully healthy
          if ! kubectl rollout status deployment/github-tamagotchi-$INACTIVE \
               -n $NS --timeout=900s; then
            echo "=== DEPLOY FAILED — traffic stays on $ACTIVE ==="
            echo "=== POD DESCRIBE ==="
            kubectl describe pods -n $NS -l app=github-tamagotchi,version=$INACTIVE
            echo "=== INIT CONTAINER LOGS ==="
            kubectl logs -n $NS -l app=github-tamagotchi,version=$INACTIVE \
              -c migrate --tail=50 2>/dev/null || true
            echo "=== APP CONTAINER LOGS ==="
            kubectl logs -n $NS -l app=github-tamagotchi,version=$INACTIVE \
              -c github-tamagotchi --tail=50 2>/dev/null || true
            kubectl scale deployment/github-tamagotchi-$INACTIVE --replicas=0 -n $NS
            exit 1
          fi

          # Atomic traffic switch
          kubectl patch service github-tamagotchi -n $NS \
            --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/selector/version\",\"value\":\"$INACTIVE\"}]"
          echo "Traffic switched to $INACTIVE"

          # Scale down old deployment
          kubectl scale deployment/github-tamagotchi-$ACTIVE --replicas=0 -n $NS
          echo "Scaled down $ACTIVE — deploy complete"

          # Send release marker to BugBarn (requires full-scope key)
          curl -sf -X POST https://bugbarn.wiebe.xyz/api/v1/releases \
            -H "Content-Type: application/json" \
            -H "X-BugBarn-Api-Key: $BUGBARN_CI_KEY" \
            -H "X-BugBarn-Project: github-tamagotchi" \
            -d "{\"name\":\"${{ github.sha }}\",\"environment\":\"production\",\"version\":\"${{ github.sha }}\",\"commitSha\":\"${{ github.sha }}\",\"url\":\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\",\"notes\":\"Deployed via CI\"}" \
            && echo "BugBarn release marker sent" || echo "BugBarn release marker failed (non-fatal)"
