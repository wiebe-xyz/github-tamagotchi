name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/e2e --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=75 --timeout=60
        timeout-minutes: 5

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short --timeout=60
        timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-testing:
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: testing
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to nijmegen-testing
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          BUGBARN_API_KEY: ${{ secrets.BUGBARN_API_KEY_PROD }}
          BUGBARN_CI_KEY: ${{ secrets.BUGBARN_CI_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          NS="nijmegen-testing"

          # Patch secrets
          kubectl patch secret github-tamagotchi-secrets -n $NS \
            --type='merge' \
            -p="{\"stringData\":{\"bugbarn-api-key\":\"$BUGBARN_API_KEY\",\"vapid-private-key\":\"$VAPID_PRIVATE_KEY\",\"vapid-public-key\":\"$VAPID_PUBLIC_KEY\"}}"

          # Blue-green deploy
          ACTIVE=$(kubectl get service github-tamagotchi -n $NS \
            -o jsonpath='{.spec.selector.version}')
          if [ "$ACTIVE" = "blue" ]; then INACTIVE="green"; else INACTIVE="blue"; fi
          echo "Active: $ACTIVE | Deploying to: $INACTIVE"

          kubectl set image deployment/github-tamagotchi-$INACTIVE \
            github-tamagotchi=$IMAGE migrate=$IMAGE -n $NS

          kubectl scale deployment/github-tamagotchi-$INACTIVE --replicas=1 -n $NS

          if ! kubectl rollout status deployment/github-tamagotchi-$INACTIVE \
               -n $NS --timeout=900s; then
            echo "=== DEPLOY FAILED — traffic stays on $ACTIVE ==="
            kubectl describe pods -n $NS -l app=github-tamagotchi,version=$INACTIVE
            kubectl logs -n $NS -l app=github-tamagotchi,version=$INACTIVE \
              -c migrate --tail=50 2>/dev/null || true
            kubectl logs -n $NS -l app=github-tamagotchi,version=$INACTIVE \
              -c github-tamagotchi --tail=50 2>/dev/null || true
            kubectl scale deployment/github-tamagotchi-$INACTIVE --replicas=0 -n $NS
            exit 1
          fi

          # Health check new pod BEFORE switching traffic
          echo "Verifying new deployment is healthy before switching traffic..."
          HEALTHY=false
          for i in $(seq 1 12); do
            sleep 5
            if kubectl exec -n $NS \
              $(kubectl get pod -n $NS -l app=github-tamagotchi,version=$INACTIVE \
                -o jsonpath='{.items[0].metadata.name}') \
              -- python3 -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/api/v1/health/ready'); exit(0 if b'healthy' in r.read() else 1)" 2>/dev/null; then
              HEALTHY=true
              echo "New deployment confirmed healthy"
              break
            fi
            echo "Health check attempt $i/12..."
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "=== PRE-SWITCH HEALTH CHECK FAILED — aborting deploy ==="
            kubectl logs -n $NS -l app=github-tamagotchi,version=$INACTIVE \
              -c github-tamagotchi --tail=50 2>/dev/null || true
            kubectl scale deployment/github-tamagotchi-$INACTIVE --replicas=0 -n $NS
            exit 1
          fi

          # Switch traffic (new pod is confirmed healthy)
          kubectl patch service github-tamagotchi -n $NS \
            --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/selector/version\",\"value\":\"$INACTIVE\"}]"
          echo "Traffic switched to $INACTIVE"

          kubectl scale deployment/github-tamagotchi-$ACTIVE --replicas=0 -n $NS
          echo "Scaled down $ACTIVE — deploy complete"

          # Record deployed SHA for staging promotion
          kubectl create configmap deploy-state \
            --from-literal=sha=${{ github.sha }} \
            -n $NS --dry-run=client -o yaml | kubectl apply -f -

          # BugBarn release marker
          curl -sf -X POST https://bugbarn.wiebe.xyz/api/v1/releases \
            -H "Content-Type: application/json" \
            -H "X-BugBarn-Api-Key: $BUGBARN_CI_KEY" \
            -H "X-BugBarn-Project: github-tamagotchi" \
            -d "{\"name\":\"${{ github.sha }}\",\"environment\":\"testing\",\"version\":\"${{ github.sha }}\",\"commitSha\":\"${{ github.sha }}\",\"url\":\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\",\"notes\":\"Deployed via CI to testing\"}" \
            && echo "BugBarn release marker sent" || echo "BugBarn release marker failed (non-fatal)"
