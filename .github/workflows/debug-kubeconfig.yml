name: Debug Kubeconfig

on:
  workflow_dispatch:

jobs:
  test-kubeconfig:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Test KUBECONFIG_PROD
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          echo "KUBECONFIG_DATA length: ${#KUBECONFIG_DATA}"
          echo "KUBECONFIG_DATA first 50 chars: ${KUBECONFIG_DATA:0:50}"

          mkdir -p /tmp/debug-kube
          echo "$KUBECONFIG_DATA" > /tmp/debug-kube/config
          chmod 600 /tmp/debug-kube/config

          echo "=== Using KUBECONFIG_PROD ==="
          KUBECONFIG=/tmp/debug-kube/config kubectl get nodes -o wide 2>&1 || echo "FAILED"

          echo "=== Default kubectl (no explicit KUBECONFIG) ==="
          kubectl get nodes -o wide 2>&1 || echo "FAILED"

          echo "=== Check for KUBECONFIG env var ==="
          echo "KUBECONFIG env: ${KUBECONFIG:-not set}"

          echo "=== Contents of ~/.kube/config server line ==="
          grep -o 'server: [^ ]*' ~/.kube/config 2>/dev/null || echo "no ~/.kube/config"

      - name: Test KUBECONFIG (staging)
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "KUBECONFIG length: ${#KUBECONFIG_DATA}"
          mkdir -p /tmp/debug-kube2
          echo "$KUBECONFIG_DATA" > /tmp/debug-kube2/config
          KUBECONFIG=/tmp/debug-kube2/config kubectl get nodes -o wide 2>&1 || echo "FAILED"
